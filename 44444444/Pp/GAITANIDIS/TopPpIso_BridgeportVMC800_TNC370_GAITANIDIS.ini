[POST PROCESSOR]
#LABEL = Axinar -> Bridgeport VMC800/22 Heidenhain TNC370
#COMPANY = Axinar
#MACHINE TOOL = Bridgeport VMC 800/22
#NUMERICAL CONTROL = Heidenhain TNC 370 (DIN/ISO mode)
#POST PROCESSOR NAME = TopPpFanuc
#FILENAME PARAMETER = TopPpFanuc#V=MILL#i=00.cfg


[DIRECTORY]
#block directory = C:\PROJECTS

[NUMERICAL CONTROL]
#type_cn = ISO

[ISO]
#Iso_Extension = I
	//TNC 370: .I file extension
#num_prog = 1
#first_ss_prog = 1
#inc_ss_prog = 1
#ref_origin = 54
#space_between_two_world = YES
#dec_Corr_long = 0
#dec_Corr_diam = 0
#val_last_tool = YES
#val_value_last_tool = 0
#mode_optimisation_bloc = RAPPEL_BLOC
	//No subroutines - all code inline
#char_start_comment = ;
#char_end_comment =
	//TNC 370 DIN/ISO: comments start with ; (semicolon), no closing char
#char_virgule = .
#char_end_block = *
	//TNC 370: asterisk at end of every block
#saisie_comment = NO
	//TNC 370: no comments in output
#default_modalite = NO

[FORMAT]
#format = %,IDENT_PROG,;;;;;;####;*1;0BY;0EN;00;.1;1;+N,NO,
	//TNC 370: program number with % prefix (4 digits, leading zeros)
	//Outputs %0001 instead of Fanuc O0001
#format = %%@%,COMM
	//TNC 370: % prefix + text (used for filename in % header)
#format = P01 ,CYC_APPROACH           ,;;;;;; #####.###; *1; 0BN; 0EN; 00; .1; 1.; +N,NO,
	//TNC 370: P01 = clearance distance (was R)
#format = P01 ,CYC_RETRACT            ,;;;;;; #####.###; *1; 0BN; 0EN; 00; .1; 1.; +N,NO,
#format = P03 ,CYC_PECKING_DEEP       ,;;;;;; #####.###; *1; 0BN; 0EN; 00; .1; 1.; +N,NO,
	//TNC 370: P03 = pecking depth (was Q)
#format = P03 ,CYC_PICOTING_DEEP      ,;;;;;; #####.###; *1; 0BN; 0EN; 00; .1; 1.; +N,NO,
#format = P04 ,CYC_DELAY              ,;;;;;; #####.###; *1; 0BN; 0EN; 00; .1; 1.; +N,NO,
	//TNC 370: P04 = dwell time (was P)

[NUM_BLOC]
#mode_num_bloc = NUM_BLOC_ALL
#num_first_bloc = 1
#num_inc_bloc = 1
#num_bloc_maxi = 999999
#num_mode_ligne = 1
#Numero_Comment = YES

[ARC]
#Mode_interpo = 5
#Mode_interpo_180 = 2
#Mode_interpo_NOXY = 0
#Arc_Heli = YES
#Tool_Decomposition = .005
#R_max_XY = 9999
#R_max_XZ = 9999
#R_max_YZ = 9999

[COOLANT]
	//Bridgeport VMC 800/22 coolant M codes
#No_Coolant = 9
#Default_Coolant = 8
#Jet_Coolant = 8
#Fog_Coolant = 8
#Center_Coolant = 8


//============================================================================
//  GENERATE BEGIN & END
//  TNC 370: %XXXX at start and end of file (4-digit program number)
//============================================================================

[DEFINE_GENERATE,BEGIN]
#bloc = MSG,[DEFINE_LIST,FILE,HEADER];

[DEFINE_GENERATE,END]
#bloc = MSG,[DEFINE_LIST,FILE,ENDER];
#bloc = NO,[#SPECIFIC=N9999 ][#COMM=LABEL_PROG][#SPECIFIC= G71];
	//TNC 370: N9999 %FILENAME G71 * at end


//============================================================================
//  PROGRAMME BEGIN & END
//  Overrides Fanuc DEFINE_PROGRAMME sections
//  TNC 370: G0/G17/G40/G80/G90/G98 init block, M2 end
//============================================================================

[DEFINE_PROGRAMME,INI]
#bloc = VAL,[ORIGIN=54];
#bloc = INI,[WORK_PLANE=17][COOLNT=9];
#bloc = INI,[DEC_X=0][DEC_Y=0][DEC_Z=0];

[DEFINE_PROGRAMME,BEGIN]
#bloc = MSG,[DEFINE_PROGRAMME,INI];
#bloc = NO,[#COMM=LABEL_PROG][#SPECIFIC= G71];
	//TNC 370: %FILENAME G71 * at start (must be in PROGRAMME,BEGIN where LABEL_PROG is available)
#bloc = MSG,[DEFINE_LIST,HEADER];
#bloc = YES,[#G_INTERPO=0][#CUTCOM=40][#G_INCREMENTAL_ABSOLUTE=90];
	//TNC 370: G0 G40 G90 safety line (no G80/G98)
#bloc = MSG,[DEFINE_TOOL,BEGIN];

[DEFINE_PROGRAMME,END]
#bloc = MSG,[DEFINE_TOOL,END];
#bloc = MSG,[DEFINE_LIST,ENDER];
#bloc = YES,[#FUNCT_M=30];
	//TNC 370: M30 program end


//============================================================================
//  TOOL BEGIN & END
//  Overrides Fanuc DEFINE_TOOL sections
//  TNC 370: G43 + H offset for tool length compensation
//============================================================================

[DEFINE_TOOL,INI]
#bloc = VAL,[G_INTERPO=0];

[DEFINE_TOOL,BEGIN]
#bloc = MSG,[DEFINE_TOOL,INI];
#bloc = YES,[#LOADTL][#FUNCT_M=6];
#bloc = YES,[#SPINDLE][#RPM];
	//no comments
#bloc = YES,[#G_INTERPO][#GOTO_X][#GOTO_Y];
	//TNC 370: no G54 - machine doesn't support it
#bloc = YES,[#FUNCT_G=43][#GOTO_Z][#OSETNOLG][#COOLNT];
	//TNC 370: G43 H offset + Z approach + coolant
#bloc = MSG,[DEFINE_OPERATION,BEGIN];

[DEFINE_TOOL,END]
#bloc = MSG,[DEFINE_OPERATION,END];
#bloc = MSG,[DEFINE_GOTO];
#bloc = CLS,[FEEDRATE];


//============================================================================
//  OPERATION BEGIN & END
//  Overrides Fanuc DEFINE_OPERATION sections
//============================================================================

[DEFINE_OPERATION,INI]

[DEFINE_OPERATION,BEGIN]
#bloc = MSG,[DEFINE_OPERATION,INI];
	//no comments
#bloc = MSG,[DEFINE_CHANGE,FRAME];
#bloc = YES,[RPM];
#bloc = MSG,[MYDEFINE_OPERATION_OPTIONAL,BEGIN]

[DEFINE_OPERATION,END]
#bloc = MSG,[MYDEFINE_OPERATION_OPTIONAL,END]

[MYDEFINE_OPERATION_OPTIONAL,BEGIN]
#bloc =  IF,[#IS_OPERATION_OPTIONAL]
#bloc = INI,[SET_OPTIONAL=1]

[MYDEFINE_OPERATION_OPTIONAL,END]
#bloc =  IF,[#IS_OPERATION_OPTIONAL]
#bloc = CLS,[SET_OPTIONAL]


//============================================================================
//  COMPENSATION
//  TNC 370: H offset for tool length, D for tool diameter
//============================================================================

[DEFINE_CHANGE,COMPENSATION]
#bloc = YES,[OSETNOLG];


//============================================================================
//  FRAME / ORIGIN
//  TNC 370 DIN/ISO: G54-G59 for work offsets
//============================================================================

[DEFINE_CHANGE,FRAME]
#bloc = MSG,[DEFINE_FRAME,ORIGIN][FACE_NUM];

[DEFINE_FRAME,INCLINED]

[DEFINE_FRAME,ORIGIN]
	//TNC 370: no G54 origin output - machine doesn't support it
#bloc = YES,[GOTO_A][GOTO_B][GOTO_C];


//============================================================================
//  GOTO with COMPENSATION
//  Overrides Fanuc DEFINE_GOTO sections
//  TNC 370: G41/G42 with D number for tool diameter
//============================================================================

[DEFINE_GOTO]
#bloc = SUB,[DEFINE_GOTO,COMPENSATION,CHANGE][!CUTCOM]
#bloc = YES,[@G_INTERPO][GOTO_X][GOTO_Y][GOTO_Z][GOTO_A][GOTO_B][GOTO_C][COOLNT][@FEEDRATE];

[DEFINE_GOTO,COMPENSATION,CHANGE]
#bloc = SUB,[DEFINE_GOTO,COMPENSATION,LEFT][#IS_COMPENSATION_LEFT];
#bloc = SUB,[DEFINE_GOTO,COMPENSATION,RIGHT][#IS_COMPENSATION_RIGHT];
#bloc = MSG,[DEFINE_GOTO,COMPENSATION,CANCEL];

[DEFINE_GOTO,COMPENSATION,CANCEL]
#bloc = YES,[@G_INTERPO][@WORK_PLANE][@#CUTCOM=40][!GOTO_X][!GOTO_Y][!GOTO_Z][@!FEEDRATE];

[DEFINE_GOTO,COMPENSATION,LEFT]
#bloc = YES,[@G_INTERPO][@WORK_PLANE][@#CUTCOM=41][!GOTO_X][!GOTO_Y][!GOTO_Z][@!OSETNODIAM][@!FEEDRATE];

[DEFINE_GOTO,COMPENSATION,RIGHT]
#bloc = YES,[@G_INTERPO][@WORK_PLANE][@#CUTCOM=42][!GOTO_X][!GOTO_Y][!GOTO_Z][@!OSETNODIAM][@!FEEDRATE];

[DEFINE_GOTO,3D]
#bloc = YES,[@G_INTERPO][GOTO_X][GOTO_Y][GOTO_Z][FEEDRATE];

[DEFINE_GOTO,THREAD]
#bloc = YES,[@#G_INTERPO=32][GOTO_X][GOTO_Z][#FEEDRATE];


//============================================================================
//  SEGMENTS with WORK PLANES
//  Same as Fanuc (standard ISO G17/G18/G19)
//============================================================================

[DEFINE_SEGMENT]
#bloc = SUB,[DEFINE_SEGMENT,XY+Z][#IS_WORK_PLANE_XY];
#bloc = SUB,[DEFINE_SEGMENT,XZ+Y][#IS_WORK_PLANE_ZX];
#bloc = SUB,[DEFINE_SEGMENT,YZ+X][#IS_WORK_PLANE_YZ];
#bloc = YES,[@G_INTERPO][CUTCOM][!GOTO_X][!GOTO_Y][!GOTO_Z][!GOTO_A][!GOTO_B][!GOTO_C][!FEEDRATE];

[DEFINE_SEGMENT,XY+Z]
 bloc =  IF,[#IS_WORK_PLANE_XY];
#bloc = YES,[@G_INTERPO][WORK_PLANE=17][CUTCOM][GOTO_X][GOTO_Y][!GOTO_Z][!GOTO_A][!GOTO_B][!GOTO_C][FEEDRATE];
[DEFINE_SEGMENT,XZ+Y]
 bloc =  IF,[#IS_WORK_PLANE_ZX];
#bloc = YES,[@G_INTERPO][WORK_PLANE=18][CUTCOM][GOTO_X][!GOTO_Y][GOTO_Z][!GOTO_A][!GOTO_B][!GOTO_C][FEEDRATE];
[DEFINE_SEGMENT,YZ+X]
 bloc =  IF,[#IS_WORK_PLANE_YZ];
#bloc = YES,[@G_INTERPO][WORK_PLANE=19][CUTCOM][!GOTO_X][GOTO_Y][GOTO_Z][!GOTO_A][!GOTO_B][!GOTO_C][FEEDRATE];


//============================================================================
//  ARCS with WORK PLANES
//  Same as Fanuc (I/J/K incremental, R for arcs < 180)
//============================================================================

[DEFINE_ARC]
#bloc = SUB,[DEFINE_ARC,XY+Z][#IS_WORK_PLANE_XY];
#bloc = SUB,[DEFINE_ARC,XZ+Y][#IS_WORK_PLANE_ZX];
#bloc = SUB,[DEFINE_ARC,YZ+X][#IS_WORK_PLANE_YZ];

[DEFINE_ARC,XY+Z]
 bloc =  IF,[#IS_WORK_PLANE_XY];
#bloc = SUB,[DEFINE_ARC,XY+Z,LOWER_180][#IS_ARC_LOWER_180];
#bloc = YES,[@#G_INTERPO][WORK_PLANE=17][CUTCOM][#GOTO_X][#GOTO_Y][#X_CENTER][#Y_CENTER][FEEDRATE];
[DEFINE_ARC,XZ+Y]
 bloc =  IF,[#IS_WORK_PLANE_ZX];
#bloc = SUB,[DEFINE_ARC,XZ+Y,LOWER_180][#IS_ARC_LOWER_180];
#bloc = YES,[@#G_INTERPO][WORK_PLANE=18][CUTCOM][#GOTO_X][#GOTO_Z][#X_CENTER][#Z_CENTER][FEEDRATE];
[DEFINE_ARC,YZ+X]
 bloc =  IF,[#IS_WORK_PLANE_YZ];
#bloc = SUB,[DEFINE_ARC,YZ+X,LOWER_180][#IS_ARC_LOWER_180];
#bloc = YES,[@#G_INTERPO][WORK_PLANE=19][CUTCOM][#GOTO_Y][#GOTO_Z][#Y_CENTER][#Z_CENTER][FEEDRATE];

[DEFINE_ARC,XY+Z,LOWER_180]
 bloc =  IF,[#IS_ARC_LOWER_180];
#bloc = YES,[@#G_INTERPO][WORK_PLANE=17][CUTCOM][#GOTO_X][#GOTO_Y][#RADIUS][FEEDRATE];
[DEFINE_ARC,XZ+Y,LOWER_180]
 bloc =  IF,[#IS_ARC_LOWER_180];
#bloc = YES,[@#G_INTERPO][WORK_PLANE=18][CUTCOM][#GOTO_X][#GOTO_Z][#RADIUS][FEEDRATE];
[DEFINE_ARC,YZ+X,LOWER_180]
 bloc =  IF,[#IS_ARC_LOWER_180];
#bloc = YES,[@#G_INTERPO][WORK_PLANE=19][CUTCOM][#GOTO_Y][#GOTO_Z][#RADIUS][FEEDRATE];


//============================================================================
//  HELIX
//============================================================================

[DEFINE_HELIX]
#bloc = SUB,[DEFINE_HELIX,XY+Z][#IS_WORK_PLANE_XY];
#bloc = SUB,[DEFINE_HELIX,XZ+Y][#IS_WORK_PLANE_ZX];
#bloc = SUB,[DEFINE_HELIX,YZ+X][#IS_WORK_PLANE_YZ];

[DEFINE_HELIX,XY+Z]
 bloc =  IF,[#IS_WORK_PLANE_XY];
#bloc = YES,[@#G_INTERPO][WORK_PLANE=17][CUTCOM][#GOTO_X][#GOTO_Y][#GOTO_Z][#X_CENTER][#Y_CENTER][FEEDRATE];
[DEFINE_HELIX,XZ+Y]
 bloc =  IF,[#IS_WORK_PLANE_ZX];
#bloc = YES,[@#G_INTERPO][WORK_PLANE=18][CUTCOM][#GOTO_X][#GOTO_Y][#GOTO_Z][#X_CENTER][#Z_CENTER][FEEDRATE];
[DEFINE_HELIX,YZ+X]
 bloc =  IF,[#IS_WORK_PLANE_YZ];
#bloc = YES,[@#G_INTERPO][WORK_PLANE=19][CUTCOM][#GOTO_X][#GOTO_Y][#GOTO_Z][#Y_CENTER][#Z_CENTER][FEEDRATE];


//============================================================================
//  SUBROUTINES - DISABLED
//  TNC 370: no subroutines, all code generated inline
//============================================================================

[DEFINE_SUBROUTINE,INI]

[DEFINE_SUBROUTINE,BEGIN]

[DEFINE_SUBROUTINE,END]

[DEFINE_SUBROUTINE,CALL]


//============================================================================
//  CYCLES
//  TNC 370 DIN/ISO: standard G-code cycles
//  G81=drill, G82=counter bore, G83=peck, G73=chip break
//  G84=tap, G85=bore, G76=fine bore
//============================================================================

//============================================================================
//  TNC 370 CYCLES
//  G81/G82/G73/G84/G85/G76 NOT supported on TNC 370
//  TNC 370 uses: G83 (define cycle) + G79 (execute at point)
//  G83 format: G83 P01 [clearance] P02 [depth] P03 [peck] P04 [dwell] P05 [feed]
//  NOTE: TopPp format system outputs Z/R/F prefixes - TNC 370 may need
//        P01-P05 format. Using standard ISO letters as fallback.
//        If machine rejects, cycle parameters need format redefinition.
//============================================================================

[DEFINE_CYCLE,CALL]
#bloc = SUB,[DEFINE_CYCLE,CALL,GOTO][#IS_CYCLE_GOTO];
#bloc = SUB,[DEFINE_CYCLE,CALL,DRILLING][#IS_CYCLE_DRILLING];
#bloc = SUB,[DEFINE_CYCLE,CALL,DRILLING,PECKING][#IS_CYCLE_DRILLING_PECKING];
#bloc = SUB,[DEFINE_CYCLE,CALL,DRILLING,PICOTING][#IS_CYCLE_DRILLING_PICOTING];
#bloc = SUB,[DEFINE_CYCLE,CALL,TAPPING][#IS_CYCLE_TAPPING];
#bloc = SUB,[DEFINE_CYCLE,CALL,BORING][#IS_CYCLE_BORING];
#bloc = SUB,[DEFINE_CYCLE,CALL,BORING,COUNTER][#IS_CYCLE_BORING_COUNTER];
#bloc = SUB,[DEFINE_CYCLE,CALL,BORING,FINISH][#IS_CYCLE_BORING_FINISH];
#bloc = YES,[#CYCLE=83][GOTO_X][GOTO_Y][#GOTO_Z][#CYC_APPROACH][FEEDRATE];
	//TNC 370: fallback G83 Z R
#bloc = YES,[#SPECIFIC=G79];

[DEFINE_CYCLE,POINT]
#bloc = YES,[@#G_INTERPO=0][GOTO_X][GOTO_Y];
#bloc = YES,[#SPECIFIC=G79];

[DEFINE_CYCLE,STOP]
#bloc = YES,[@G_INTERPO=0][GOTO_X][GOTO_Y][GOTO_Z];
#bloc = OLD,[@G_INTERPO];

[DEFINE_CYCLE,CALL,DRILLING]
#bloc = YES,[#CYCLE=83][GOTO_X][GOTO_Y][#GOTO_Z][#CYC_APPROACH][FEEDRATE];
#bloc = YES,[#SPECIFIC=G79];

[DEFINE_CYCLE,CALL,DRILLING,PECKING]
#bloc = YES,[#CYCLE=83][GOTO_X][GOTO_Y][#GOTO_Z][#CYC_APPROACH][#CYC_PECKING_DEEP][FEEDRATE];
#bloc = YES,[#SPECIFIC=G79];

[DEFINE_CYCLE,CALL,DRILLING,PICOTING]
#bloc = YES,[#CYCLE=83][GOTO_X][GOTO_Y][#GOTO_Z][#CYC_APPROACH][#CYC_PICOTING_DEEP][FEEDRATE];
#bloc = YES,[#SPECIFIC=G79];

[DEFINE_CYCLE,CALL,BORING,COUNTER]
#bloc = YES,[#CYCLE=83][GOTO_X][GOTO_Y][#GOTO_Z][#CYC_APPROACH][#CYC_DELAY][FEEDRATE];
#bloc = YES,[#SPECIFIC=G79];

[DEFINE_CYCLE,CALL,TAPPING]
#bloc = YES,[#CYCLE=83][GOTO_X][GOTO_Y][#GOTO_Z][#CYC_APPROACH][FEEDRATE];
#bloc = YES,[#SPECIFIC=G79];

[DEFINE_CYCLE,CALL,BORING]
#bloc = YES,[#CYCLE=83][GOTO_X][GOTO_Y][#GOTO_Z][#CYC_APPROACH][FEEDRATE];
#bloc = YES,[#SPECIFIC=G79];

[DEFINE_CYCLE,CALL,BORING,FINISH]
#bloc = YES,[#CYCLE=83][GOTO_X][GOTO_Y][#GOTO_Z][#CYC_APPROACH][FEEDRATE];
#bloc = YES,[#SPECIFIC=G79];


//============================================================================
//  MAIN SUB-PROGRAM TRANSFORMS
//  TNC 370: does not use G10 for coordinate transforms
//  Empty sections to prevent Fanuc G10 behavior
//============================================================================

[DEFINE_MAIN_SPROG,BEGIN]

[DEFINE_MAIN_SPROG,END]


//============================================================================
//  MISC, COMMENTS, LIST SECTIONS
//============================================================================

[DEFINE_COMMENT]
	//TNC 370: no comments

[DEFINE_DMB]
#bloc = YES,[#SPECIFIC];

[DEFINE_LIST,TOOL]
[DEFINE_LIST,FACE]
[DEFINE_LIST,COMPENSATION]
[DEFINE_LIST,FILE,HEADER]
#bloc = NO,[#SPECIFIC];
[DEFINE_LIST,FILE,ENDER]
#bloc = NO,[#SPECIFIC];
[DEFINE_LIST,HEADER]
#bloc = NO,[#SPECIFIC];
[DEFINE_LIST,ENDER]
#bloc = NO,[#SPECIFIC];
